name: Sync Upstream
run-name: Upstream Sync
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
    contents: write
    id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: "Read Secrets"
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/rancher-release-team-auto-tagger/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/rancher-release-team-auto-tagger/app-credentials privateKey | PRIVATE_KEY

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}

      - name: Sync Upstream Releases
        uses: rancher/ecm-distro-tools/actions/sync-upstream-release@8821b2e4aa18f762dc334f811f54e8f215771a68 # v0.66.2
        with:
          upstream-owner: 'containernetworking'
          upstream-repo: 'plugins'
          image-build-owner: ${{ github.repository_owner }}
          image-build-repo: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          tag-prefix: ''
