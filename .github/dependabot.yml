version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "kind/dependabot"
    reviewers:
      - "rancher/k3s"
    groups:
      action-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "major"
